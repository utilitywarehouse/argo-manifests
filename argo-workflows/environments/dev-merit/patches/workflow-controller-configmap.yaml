apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-configmap
data:
  persistence: |
    nodeStatusOffLoad: true
    archive: true
    archiveTTL: 7d
    connectionPool:
      maxIdleConns: 50
      maxOpenConns: 50
      connMaxLifetime: 5m
    postgresql:
      host: qe-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com
      port: 5432
      database: argo_workflows_db
      tableName: argo_workflows
      ssl: true
      sslMode: require
      userNameSecret:
        name: argo-postgres-config
        key: username
      passwordSecret:
        name: argo-postgres-config
        key: password

  # Database-backed semaphores/mutexes. NOT required for persistence above.
  # Only enable if workflows use synchronization (semaphore/mutex) and you want
  # locks to survive restarts / coordinate across multiple controllers. It uses
  # the same DB but its own connection block and its own tables.
  #
  # synchronization: |
  #   controllerName: qe-dev-merit
  #   postgresql:
  #     host: qe-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com
  #     port: 5432
  #     database: argo_workflows_db
  #     ssl: true
  #     sslMode: require
  #     userNameSecret:
  #       name: argo-postgres-config
  #       key: username
  #     passwordSecret:
  #       name: argo-postgres-config
  #       key: password
