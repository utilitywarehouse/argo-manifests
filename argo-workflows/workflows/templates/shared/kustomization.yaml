apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - executor-remote-namespace.yaml
  - data-orchestrator-runner.yaml
  - healthcheck-namespace.yaml

# ---------------------------------------------------------------------------
# Single source of truth for the critical image versions. Bump a tag here and
# it propagates to every environment (all envs pull templates/ -> shared/).
#
# These images can't be pinned by kustomize's `images:` transformer if they are
# Argo *parameter* strings or job heredoc (not container image fields).
#
# To bump a version: edit the literal below. To override per-environment: patch
# these literals (or add replacements) in the environment overlay.
# ---------------------------------------------------------------------------
configMapGenerator:
  - name: image-versions
    options:
      annotations:
        config.kubernetes.io/local-config: "true"
    literals:
      - data-orchestrator=registry.uw.systems/dev-enablement/data-orchestrator:5c9063aa3d12e0482d7cd37c368950e750377868
      - data-adapter=registry.uw.systems/dev-enablement/data-adapter:5c9063aa3d12e0482d7cd37c368950e750377868
      - call-grpc=registry.uw.systems/dev-enablement/call-grpc:35ab89428d1770946eb2c0e766cfd2790dbc0495
      - call-http=registry.uw.systems/dev-enablement/call-http:35ab89428d1770946eb2c0e766cfd2790dbc0495
      - exec-kube=registry.uw.systems/dev-enablement/exec-kube:chore-redesign-wkflw-data-prop
      - query-pg=registry.uw.systems/dev-enablement/query-pg:80b1439b0c21d5ae40fc7c600a89f142fe2274d9
      - select=registry.uw.systems/dev-enablement/select:chore-redesign-wkflw-data-prop
generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source:
      {
        kind: ConfigMap,
        name: image-versions,
        fieldPath: data.data-orchestrator,
      }
    targets:
      - select: { kind: WorkflowTemplate, name: data-orchestrator-runner }
        fieldPaths:
          - spec.arguments.parameters.[name=orchestrator-image].value
          - spec.templates.[name=run].inputs.parameters.[name=orchestrator-image].value
  - source:
      { kind: ConfigMap, name: image-versions, fieldPath: data.data-adapter }
    targets:
      - select: { kind: WorkflowTemplate, name: data-orchestrator-runner }
        fieldPaths:
          - spec.arguments.parameters.[name=adapter-image].value
          - spec.templates.[name=run].inputs.parameters.[name=adapter-image].value
  - source: { kind: ConfigMap, name: image-versions, fieldPath: data.call-grpc }
    targets:
      - select: { kind: WorkflowTemplate, name: data-orchestrator-runner }
        fieldPaths:
          - spec.arguments.parameters.[name=call-grpc-image].value
          - spec.templates.[name=run].inputs.parameters.[name=call-grpc-image].value
  - source: { kind: ConfigMap, name: image-versions, fieldPath: data.exec-kube }
    targets:
      - select: { kind: WorkflowTemplate, name: executor-remote-namespace }
        fieldPaths:
          - spec.templates.[name=execute-job].container.image
