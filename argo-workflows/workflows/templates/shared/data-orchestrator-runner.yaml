# =============================================================================
# data-orchestrator-runner — generic, ephemeral data-orchestrator run
# =============================================================================
# Renders a single-pod Kubernetes Job and dispatches it to a target
# namespace/cluster via the `executor-remote-namespace` template. Per-system
# CronWorkflows reference this via `workflowTemplateRef` and supply only the
# adapter + run scope; everything else has an environment default below.
#
# Pod anatomy — one pod, four containers (see the Job spec for full wiring):
#
#   render-adapters-config  init      writes /etc/do/adapters.yaml (localhost wiring)
#   adapter                 sidecar   the per-system SOURCE adapter; reads the team's
#                                     source DB; serves the orchestrator on :50051. Its
#                                     startupProbe GATES the orchestrator — see below.
#   orchestrator            sidecar   the data-orchestrator; owns the SHARED RDS + the
#                                     S3 output bucket; serves gRPC on :8090. Starts only
#                                     after the adapter is /__/ready.
#   trigger                 main      StartRun, then poll GetRunStatus to completion
#
# Startup ordering is deliberate: adapter (ready) → orchestrator → trigger. The adapter is
# sequenced ahead of the orchestrator so its boot-time RDS/IAM call lands after the kyverno
# vault-sidecar-aws is serving creds on :8098 (that race crashed the orchestrator on cold start).
#
# Two look-alike settings that mean DIFFERENT things per container — do not conflate:
#   DB_DSN         orchestrator → shared orchestrator RDS (IAM auth, passwordless)
#                  adapter      → the team's SOURCE DB (from adapter-secret/-config, or literal adapter-dsn)
#   AWS_S3_BUCKET  orchestrator → output bucket it writes results to
#                  adapter      → only relevant if the adapter streams to S3 itself
#
# Parameters fall into two groups. The CronWorkflow supplies the per-run set;
# the rest are environment defaults, changed per environment.
#
#   Supplied per run
#     mode, run-type, system-key         what to run
#     adapter-secret|-config, adapter-dsn-key  source DSN (team's secret or configmap in target ns)
#     target-namespace, cluster-name      where to run / how to dispatch
#
#   Environment defaults
#     entities, label, triggered-by       run scope / metadata
#     orchestrator-image, adapter-image   container images
#     adapter-args                        adapter argv
#     adapter-driver                      adapter DB driver (postgres | cockroach)
#     aws-bucket, aws-region              S3 output
#     orchestrator-db-dsn                 shared orchestrator RDS (literal, IAM auth);
#       or orchestrator-db-secret + -key  ...sourced from a secret instead (password DSN)
#     runner-sa                           Job pod identity
#     timeout                             run deadline
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: data-orchestrator-runner
  annotations:
    workflows.argoproj.io/description: >-
      Do NOT submit from the UI. Consumed by per-system
      CronWorkflows via workflowTemplateRef.
  labels:
    workflows.argoproj.io/creator: qe
    workflows.argoproj.io/invocation: reference-only
spec:
  entrypoint: run
  # exec-kube (Argo side) uses this SA to read job-executor-tokens / cluster-ca-certs and report
  # task results. This is NOT the identity the Job pod runs as — that is `runner-sa`, below.
  serviceAccountName: workflow-step-executor

  # ---------------------------------------------------------------------------
  # Every parameter has a default. Per-system CronWorkflows override the per-run
  # set (what to run + where); the rest are environment defaults.
  # ---------------------------------------------------------------------------
  arguments:
    parameters:
      # what to run
      - { name: mode } # export | import — selects adapters.yaml section + adapter MODE
      - { name: run-type } # RUN_TYPE_EXPORT | RUN_TYPE_IMPORT
      - { name: system-key } # e.g. energy_tariff_system
      # adapter DSN — three mutually exclusive ways to supply it.
      # Precedence: literal, then secret, then configmap:
      #   literal   : adapter-dsn → plain value
      #   secret    : adapter-secret + adapter-dsn-key  → valueFrom secretKeyRef
      #   configmap : adapter-config + adapter-dsn-key  → valueFrom configMapKeyRef
      - { name: adapter-secret, value: "" } # secret in target ns holding the DSN
      - { name: adapter-config, value: "" } # configmap in target ns holding the DSN (alternative to adapter-secret)
      - { name: adapter-dsn-key, value: "DB_DSN" } # key within adapter-secret / adapter-config
      - { name: adapter-dsn, value: "" } # literal DSN; alternative to adapter-secret/-config, takes precedence when set
      # where to run / dispatch
      - { name: target-namespace, value: "" } # namespace to run the Job in (source DB reachable)
      - { name: cluster-name, value: "" } # target cluster → resolves CA + token + server 1:1
      # run scope / metadata
      - { name: entities, value: "" } # comma-separated list, e.g. "tariffs, tariff_rates". Empty = all.
      # IMPORT only: which export run to import from. Empty = the orchestrator resolves the latest
      # completed export run for system-key. Ignored for export. Sent to StartRun only when non-empty.
      - { name: source-run-id, value: "" }
      - { name: label, value: adhoc }
      - { name: triggered-by, value: argo }
      - { name: log-level, value: info }
      # container images (env-specific)
      - {
          name: orchestrator-image,
          value: "registry.uw.systems/dev-enablement/data-orchestrator:ba325938a016f757dd9c9b9ae9cb40738035d96c",
        }
      - {
          name: adapter-image,
          value: "registry.uw.systems/dev-enablement/data-adapter:ba325938a016f757dd9c9b9ae9cb40738035d96c",
        }
      - { name: adapter-args, value: "serve" }
      - { name: adapter-driver, value: postgres }
      # CockroachDB cert auth for the adapter's SOURCE DB (optional). The adapter fetches its
      # client cert from the CA service; postgres sources don't need this. Each env var is only
      # rendered on the adapter when its source param is non-empty — leave unset otherwise.
      - { name: ca-secret, value: "" } # secret holding the CA auth key → CA_AUTH_KEY
      - { name: ca-auth-key, value: "" } # key within ca-secret
      - { name: ca-config, value: "" } # configmap holding the CA profile + endpoint
      - { name: ca-profile-key, value: "" } # key within ca-config → CA_PROFILE
      - { name: ca-address-key, value: "" } # key within ca-config → CA_ADDRESS
      # S3 output (env-specific)
      - { name: aws-bucket, value: uw-dev-qe-dev-data-orchestrator }
      - { name: aws-region, value: eu-west-1 }
      # shared orchestrator RDS (env-specific). This is NOT the adapter's source DB.
      # Two mutually exclusive ways to supply the DSN (orchestrator-db-dsn wins if set):
      #   literal : orchestrator-db-dsn                              → plain value (IAM auth, passwordless)
      #   secret  : orchestrator-db-secret + orchestrator-db-dsn-key → valueFrom secretKeyRef (password DSN)
      # NOTE the asymmetry vs adapter-dsn: THIS default is a non-empty literal, so omitting the
      # param falls back to this QE DSN — not "". To use a secret you must set orchestrator-db-dsn: ""
      # explicitly in the base/overlay (see staging-ept import overlay), then set the two params below.
      - {
          name: orchestrator-db-dsn,
          value: "postgres://dev_data_orchestrator_role@qe-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com:5432/dev_data_orchestrator_db?sslmode=require",
        }
      - { name: orchestrator-db-secret, value: "" } # secret holding the DSN; used only when orchestrator-db-dsn is ""
      - { name: orchestrator-db-dsn-key, value: "DB_DSN" } # key within orchestrator-db-secret
      # Job pod identity — the bundle's data-orchestrator SA (carries the vault AWS role). env-neutral for now.
      - { name: runner-sa, value: data-orchestrator }
      # Docker hub pull creds (namespace-specific) — the Job pod must pull the private dev-enablement images.
      - { name: image-pull-secret, value: dockerhub-key }
      - { name: timeout, value: 30m }
      # Job self-cleanup safety net, independent of exec-kube (which stops managing the Job at
      # its own timeout): activeDeadlineSeconds force-terminates a runaway/crashlooping pod and
      # marks the Job Failed; ttlSecondsAfterFinished GCs a finished (retained-for-debug) Job
      # after the window so failures don't accumulate.
      - { name: job-active-deadline, value: 35m } # backstop just beyond the 30m timeout
      - { name: job-ttl, value: 24h } # debug retention, then auto-delete

  templates:
    - name: run
      inputs:
        parameters:
          # per-run (no default — must be supplied)
          - { name: mode }
          - { name: run-type }
          - { name: system-key }
          - { name: target-namespace }
          - { name: cluster-name }
          - { name: adapter-secret, value: "" }
          - { name: adapter-config, value: "" }
          - { name: adapter-dsn-key, value: "DB_DSN" }
          - { name: adapter-dsn, value: "" }
          - { name: entities, value: "" }
          - { name: source-run-id, value: "" }
          - { name: label, value: adhoc }
          - { name: triggered-by, value: argo }
          - { name: log-level, value: info }
          - {
              name: orchestrator-image,
              value: "registry.uw.systems/dev-enablement/data-orchestrator:ba325938a016f757dd9c9b9ae9cb40738035d96c",
            }
          - {
              name: adapter-image,
              value: "registry.uw.systems/dev-enablement/data-adapter:ba325938a016f757dd9c9b9ae9cb40738035d96c",
            }
          - { name: adapter-args, value: "serve" }
          - { name: adapter-driver, value: postgres }
          - { name: ca-secret, value: "" }
          - { name: ca-auth-key, value: "" }
          - { name: ca-config, value: "" }
          - { name: ca-profile-key, value: "" }
          - { name: ca-address-key, value: "" }
          - { name: aws-bucket, value: uw-dev-qe-dev-data-orchestrator }
          - { name: aws-region, value: eu-west-1 }
          - {
              name: orchestrator-db-dsn,
              value: "postgres://dev_data_orchestrator_role@qe-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com:5432/dev_data_orchestrator_db?sslmode=require",
            }
          - { name: orchestrator-db-secret, value: "" }
          - { name: orchestrator-db-dsn-key, value: "" }
          - { name: runner-sa, value: data-orchestrator }
          - { name: image-pull-secret, value: dockerhub-key }
          - { name: timeout, value: 30m }
          - { name: job-active-deadline, value: 35m }
          - { name: job-ttl, value: 24h }
      steps:
        - - name: execute
            templateRef:
              name: executor-remote-namespace
              template: execute-job
            arguments:
              parameters:
                - {
                    name: cluster-name,
                    value: "{{inputs.parameters.cluster-name}}",
                  }
                - {
                    name: target-namespace,
                    value: "{{inputs.parameters.target-namespace}}",
                  }
                - { name: timeout, value: "{{inputs.parameters.timeout}}" }
                - { name: log-level, value: "{{inputs.parameters.log-level}}" }
                # Full Job manifest, rendered as a string. Argo substitutes every
                # {{inputs.parameters.*}} before exec-kube creates the Job in the target namespace.
                - name: job-template
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    metadata:
                      generateName: do-run-{{inputs.parameters.system-key}}-
                    spec:
                      backoffLimit: 0
                      # Bounds total lifetime: a stuck/crashlooping/infinite-loop pod is force-
                      # terminated at the deadline and the Job marked Failed — so it stops even if
                      # exec-kube has already exited and left the Job retained for debugging.
                      # k8s wants integer seconds; the {{=...}} expr converts the duration param.
                      activeDeadlineSeconds: {{=int(duration(inputs.parameters['job-active-deadline']).Seconds())}}
                      # Auto-delete the finished Job (and its pod) after this window: retained
                      # failed Jobs are kept for debugging but do not pile up forever.
                      ttlSecondsAfterFinished: {{=int(duration(inputs.parameters['job-ttl']).Seconds())}}
                      template:
                        metadata:
                          annotations:
                            uw.systems/kyverno-inject-sidecar-request: vault-sidecar-aws
                        spec:
                          serviceAccountName: {{inputs.parameters.runner-sa}}
                          imagePullSecrets:
                            - name: {{inputs.parameters.image-pull-secret}}
                          restartPolicy: Never
                          volumes:
                            - name: do-config
                              emptyDir: {}
                          initContainers:
                            # ---- render-adapters-config (init, runs to completion) --------------
                            # Writes the orchestrator's localhost wiring: system-key → :50051.
                            - name: render-adapters-config
                              image: alpine:3.24.1
                              command: [sh, -c]
                              args:
                                - |
                                  cat > /etc/do/adapters.yaml <<EOF
                                  {{inputs.parameters.mode}}:
                                    - system_key: {{inputs.parameters.system-key}}
                                      address: localhost:50051
                                  EOF
                                  echo "rendered /etc/do/adapters.yaml:"; cat /etc/do/adapters.yaml
                              volumeMounts:
                                - { name: do-config, mountPath: /etc/do }

                            # ==== ADAPTER (sidecar) — starts BEFORE the orchestrator ======
                            # The per-system SOURCE adapter. Reads the team's source DB and serves
                            # the orchestrator on :50051. DB_DSN here is the SOURCE DSN, mapped from
                            # the team's own secret OR configmap in the target ns (key = adapter-dsn-key).
                            # Deliberately NOT envFrom: that would also inject any AWS_* keys in the
                            # secret and clobber the vault-injected creds.
                            - name: adapter
                              restartPolicy: Always
                              image: {{inputs.parameters.adapter-image}}
                              imagePullPolicy: Always
                              args: [{{inputs.parameters.adapter-args}}]
                              ports:
                                - { name: http, containerPort: 8081 }   # HTTP_ADDR — health endpoints
                              resources:
                                requests:
                                  cpu: 1
                                  memory: 1Gi
                                limits:
                                  cpu: 4
                                  memory: 4Gi
                              env:
                                - { name: UW_LOG_LEVEL, value: {{inputs.parameters.log-level}} }
                                - { name: LOG_LEVEL, value: {{inputs.parameters.log-level}} }
                                - name: DB_DSN
                                  {{=inputs.parameters['adapter-dsn'] != '' ? 'value: "' + inputs.parameters['adapter-dsn'] + '"' : (inputs.parameters['adapter-secret'] != '' ? 'valueFrom: { secretKeyRef: { name: ' + inputs.parameters['adapter-secret'] + ', key: ' + inputs.parameters['adapter-dsn-key'] + ' } }' : 'valueFrom: { configMapKeyRef: { name: ' + inputs.parameters['adapter-config'] + ', key: ' + inputs.parameters['adapter-dsn-key'] + ' } }')}}
                                - { name: RDS_USE_PASSWORD_AUTH, value: "true" }
                                - { name: DB_DRIVER, value: {{inputs.parameters.adapter-driver}} }   # postgres | cockroach
                                - { name: MODE, value: {{inputs.parameters.mode}} }
                                - { name: SYSTEM_KEY, value: {{inputs.parameters.system-key}} }
                                - { name: GRPC_ADDR, value: ":50051" }    # fixed internal contract
                                - { name: HTTP_ADDR, value: ":8081" }
                                - { name: AWS_REGION, value: {{inputs.parameters.aws-region}} }
                                - { name: AWS_S3_BUCKET, value: {{inputs.parameters.aws-bucket}} }
                                # CockroachDB cert auth (optional). Each entry renders only when its source
                                # param is set; otherwise the line collapses to whitespace (valid in the seq).
                                {{=inputs.parameters['ca-secret'] != '' ? '- { name: CA_AUTH_KEY, valueFrom: { secretKeyRef: { name: ' + inputs.parameters['ca-secret'] + ', key: ' + inputs.parameters['ca-auth-key'] + ' } } }' : ''}}
                                {{=inputs.parameters['ca-config'] != '' ? '- { name: CA_PROFILE, valueFrom: { configMapKeyRef: { name: ' + inputs.parameters['ca-config'] + ', key: ' + inputs.parameters['ca-profile-key'] + ' } } }' : ''}}
                                {{=inputs.parameters['ca-config'] != '' ? '- { name: CA_ADDRESS, valueFrom: { configMapKeyRef: { name: ' + inputs.parameters['ca-config'] + ', key: ' + inputs.parameters['ca-address-key'] + ' } } }' : ''}}
                              startupProbe:
                                httpGet: { path: /__/ready, port: http }
                                initialDelaySeconds: 15
                                timeoutSeconds: 10
                              readinessProbe:
                                httpGet: { path: /__/ready, port: http }
                                initialDelaySeconds: 15
                                timeoutSeconds: 10
                              livenessProbe:
                                httpGet: { path: /__/health, port: http }
                                initialDelaySeconds: 15
                                timeoutSeconds: 10

                            # ==== ORCHESTRATOR (sidecar) — starts only after the adapter is /__/ready ======
                            # The data-orchestrator. Owns the SHARED RDS + the S3 output bucket, and
                            # serves gRPC on :8090 (the trigger drives it). AWS creds come from
                            # vault injection (runner-sa's role); RDS is IAM auth, so DB_DSN is
                            # passwordless — the app mints the token.
                            - name: orchestrator
                              restartPolicy: Always
                              image: {{inputs.parameters.orchestrator-image}}
                              imagePullPolicy: Always
                              command: ["/svc", "serve"]
                              resources:
                                limits:
                                  cpu: 2
                                  memory: 2Gi
                              env:
                                - { name: UW_LOG_LEVEL, value: {{inputs.parameters.log-level}} }
                                - { name: LOG_LEVEL, value: {{inputs.parameters.log-level}} }
                                - { name: GRPC_ADDR, value: ":8090" }
                                - { name: HTTP_ADDR, value: ":8080" }
                                - { name: ADAPTERS_CONFIG, value: /etc/do/adapters.yaml }
                                - { name: AWS_REGION, value: {{inputs.parameters.aws-region}} }
                                - { name: AWS_S3_BUCKET, value: {{inputs.parameters.aws-bucket}} }        # output bucket
                                - name: DB_DSN
                                  {{=inputs.parameters['orchestrator-db-dsn'] != '' ? 'value: "' + inputs.parameters['orchestrator-db-dsn'] + '"' : 'valueFrom: { secretKeyRef: { name: ' + inputs.parameters['orchestrator-db-secret'] + ', key: ' + inputs.parameters['orchestrator-db-dsn-key'] + ' } }'}}
                              volumeMounts:
                                - { name: do-config, mountPath: /etc/do }
                          containers:
                            # ==== TRIGGER (main container) =======================================
                            # Drives the run via the call-grpc executor (gRPC server reflection):
                            # waits for the orchestrator API, StartRun (capturing runId), then polls
                            # GetRunStatus to a terminal state. The shell only sequences the two
                            # calls and applies the zero-jobs guard; all gRPC I/O and field
                            # extraction is done by /app/executor. Emits the run id for exec-kube
                            # (ARGO_RESULT_OUTPUT=). The orchestrator image must have gRPC server
                            # reflection enabled.
                            - name: trigger
                              image: registry.uw.systems/dev-enablement/call-grpc:9ef49fe90e4b73605b2f2471943d0c2a8456d4bb
                              command: [sh, -c]
                              args:
                                - |
                                  set -eu
                                  SERVICE=uw.platform.data.orchestrator.v1.OrchestratorService
                                  # entities: "tariffs, tariff_rates" -> "tariffs","tariff_rates"  (empty = all)
                                  ENTITIES=$(printf '%s' "{{inputs.parameters.entities}}" | tr ',' '\n' \
                                    | sed 's/^ *//; s/ *$//; /^$/d; s/^/"/; s/$/"/' | tr '\n' ',' | sed 's/,$//')
                                  # IMPORT only: pin a specific export run. Empty = orchestrator resolves the latest.
                                  SRC=""
                                  if [ -n "{{inputs.parameters.source-run-id}}" ]; then SRC="\"sourceRunId\":\"{{inputs.parameters.source-run-id}}\","; fi

                                  # StartRun. A rejected run comes back on the `rejected` oneof branch, so
                                  # accepted.runId is absent and extraction fails — echo the response (which
                                  # carries rejected.reason) instead of a misleading "field not found".
                                  PAYLOAD="{\"runType\":\"{{inputs.parameters.run-type}}\",\"scope\":[{\"systemKey\":\"{{inputs.parameters.system-key}}\",\"entities\":[$ENTITIES]}],$SRC\"label\":\"{{inputs.parameters.label}}\",\"triggeredBy\":\"{{inputs.parameters.triggered-by}}\"}"
                                  echo "StartRun payload: $PAYLOAD"
                                  if ! /app/executor --address localhost:8090 --method "$SERVICE/StartRun" \
                                    --payload "$PAYLOAD" \
                                    --result-field accepted.runId --result-path /tmp/run-id --output /tmp/start.json; then
                                    echo "StartRun was not accepted:"; cat /tmp/start.json 2>/dev/null; exit 1
                                  fi
                                  RUN=$(cat /tmp/run-id); echo "run_id=$RUN"
                                  echo "StartRun response:"; cat /tmp/start.json 2>/dev/null; echo

                                  /app/executor --address localhost:8090 --method "$SERVICE/GetRunStatus" \
                                    --payload "{\"runId\":\"$RUN\"}" \
                                    --poll-field run.state --poll-success RUN_STATE_SUCCEEDED --poll-failure RUN_STATE_FAILED,RUN_STATE_PARTIAL,RUN_STATE_CANCELLED \
                                    --timeout {{=int(duration(inputs.parameters['timeout']).Seconds())}} --output /tmp/status.json

                                  grep -q '"jobId"' /tmp/status.json || { echo "SUCCEEDED but planned 0 jobs — nothing moved; check orchestrator/adapter logs above"; cat /tmp/status.json; exit 1; }
                                  echo "run succeeded"; echo "ARGO_RESULT_OUTPUT=$RUN"
