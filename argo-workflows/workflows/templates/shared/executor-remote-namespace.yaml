apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: executor-remote-namespace
  annotations:
    workflows.argoproj.io/description: >-
      Do NOT submit from the UI.
  labels:
    workflows.argoproj.io/creator: qe
    workflows.argoproj.io/invocation: reference-only
spec:
  templates:
    - name: execute-job
      inputs:
        parameters:
          # cluster-name is the single key that resolves everything 1:1: the CA cert
          # (cluster-ca-certs/<cluster-name>-ca.crt), the token
          # (job-executor-tokens/<cluster-name>-<namespace>) and the API server URL
          # (cluster-servers/<cluster-name>, see CLUSTER_SERVER below).
          - name: cluster-name
          - name: target-namespace
          - name: job-template
          - name: timeout
            value: "5m"
          - name: teardown
            value: "true"
          - name: log-level
            value: "info"
      outputs:
        artifacts:
          - name: result
            path: /tmp/result.txt
            archive:
              none: {}
          - name: logs
            path: /tmp/logs.txt
            archive:
              none: {}
        parameters:
          - name: result
            valueFrom:
              path: /tmp/result.txt
      volumes:
        - name: job-executor-tokens
          secret:
            secretName: job-executor-tokens
        - name: cluster-ca-certs
          configMap:
            name: cluster-ca-certs
      container:
        image: registry.uw.systems/dev-enablement/exec-kube:9ef49fe90e4b73605b2f2471943d0c2a8456d4bb
        env:
          - name: CLUSTER_NAME
            value: "{{inputs.parameters.cluster-name}}"
          # Resolved from the per-environment cluster-servers ConfigMap by cluster-name;
          # Argo substitutes {{inputs.parameters.cluster-name}} into the key before submit.
          - name: CLUSTER_SERVER
            valueFrom:
              configMapKeyRef:
                name: cluster-servers
                key: "{{inputs.parameters.cluster-name}}"
          - name: NAMESPACE
            value: "{{inputs.parameters.target-namespace}}"
          - name: JOB_TEMPLATE
            value: "{{inputs.parameters.job-template}}"
          - name: WORKFLOW_NAME
            value: "{{workflow.name}}"
          - name: WORKFLOW_UID
            value: "{{workflow.uid}}"
          - name: WORKFLOW_STEP_NAME
            value: "{{steps.name}}"
          - name: TIMEOUT
            value: "{{inputs.parameters.timeout}}"
          - name: TEARDOWN
            value: "{{inputs.parameters.teardown}}"
          - name: LOG_LEVEL
            value: "{{inputs.parameters.log-level}}"
          - name: TOKENS_PATH
            value: /secrets/tokens
          - name: CERTS_PATH
            value: /certs
          - name: RESULT_PATH
            value: /tmp/result.txt
          - name: LOGS_PATH
            value: /tmp/logs.txt
        volumeMounts:
          - name: job-executor-tokens
            mountPath: /secrets/tokens
          - name: cluster-ca-certs
            mountPath: /certs
