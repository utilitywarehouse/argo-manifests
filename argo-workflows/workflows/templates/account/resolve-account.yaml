# =============================================================================
# resolve-account — account-platform leaf: account number → account_id
# =============================================================================
# Single responsibility: look up the customer account_id for a given account
# number in the account-platform `account_numbers` table (a point lookup on the
# `number` key), and expose it as the `account-id` parameter.
#
#   in : account-number
#   out: account-id  (customer_account_id, uuid) — the leaf's `result` parameter
#
# This is ONE stage of the account pipeline. The orchestrator
# (test-account-select) pipes account-id on into resolve-energy-service-identifiers
# to get the account's energy supplies / gentrack identifiers. Kept submittable
# standalone (a bare account# → account_id lookup is useful on its own) and also
# consumed via templateRef. See docs/data-flow.md.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: resolve-account
  namespace: qe-argo-workflows
  annotations:
    workflows.argoproj.io/description: >-
      account-platform lookup: account-number → account_id (the `account-id` param).
      Submittable, and consumed via templateRef by the account pipeline.
  labels:
    workflows.argoproj.io/creator: qe
    workflows.argoproj.io/invocation: standalone
    data.uw.systems/system: account
spec:
  entrypoint: resolve
  serviceAccountName: workflow-step-executor
  arguments:
    parameters:
      - { name: account-number }

      - { name: account-cluster-name, value: dev-aws }
      - { name: account-namespace, value: account-platform }
      - {
          name: account-connection-string,
          value: "postgresql://accounts@cockroachdb-proxy:26257/account_numbers?sslmode=verify-full&application_name=resolve-account",
        }
      - { name: account-runner-sa, value: default }
      - { name: account-ca-secret, value: ca-auth-key } # → CA_AUTH_KEY
      - { name: account-ca-auth-key, value: auth.key } # key within account-ca-secret
      - { name: account-ca-address, value: "certificate-authority:8080" } # → CA_ADDRESS
      - { name: account-ca-profile, value: client } # → CA_PROFILE (client cert)
      - {
          name: query-pg-image,
          value: "registry.uw.systems/dev-enablement/query-pg:main",
        }
      - { name: image-pull-secret, value: dockerhub-key }
      - { name: log-level, value: info }
      - { name: timeout, value: 3m }
      - { name: job-active-deadline, value: 5m }
      - { name: job-ttl, value: 24h }
      # Debug knob: set false to keep the remote lookup Job for inspection.
      - { name: teardown, value: "true" }
  templates:
    - name: resolve
      inputs:
        parameters:
          - { name: account-number }
          - { name: account-cluster-name, value: dev-aws }
          - { name: account-namespace, value: account-platform }
          - {
              name: account-connection-string,
              value: "postgresql://accounts@cockroachdb-proxy:26257/account_numbers?sslmode=verify-full&application_name=resolve-account",
            }
          - { name: account-runner-sa, value: default }
          - { name: account-ca-secret, value: ca-auth-key }
          - { name: account-ca-auth-key, value: auth.key }
          - { name: account-ca-address, value: "certificate-authority:8080" }
          - { name: account-ca-profile, value: client }
          - {
              name: query-pg-image,
              value: "registry.uw.systems/dev-enablement/query-pg:main",
            }
          - { name: image-pull-secret, value: dockerhub-key }
          - { name: log-level, value: info }
          - { name: timeout, value: 3m }
          - { name: job-active-deadline, value: 5m }
          - { name: job-ttl, value: 24h }
          - { name: teardown, value: "true" }
      outputs:
        parameters:
          - name: account-id
            valueFrom:
              parameter: "{{steps.account-platform.outputs.parameters.result}}"
      steps:
        # account-platform: account-number → account_id (point lookup on `number`)
        - - name: account-platform
            templateRef:
              name: executor-remote-namespace
              template: execute-job
            arguments:
              parameters:
                - {
                    name: cluster-name,
                    value: "{{inputs.parameters.account-cluster-name}}",
                  }
                - {
                    name: target-namespace,
                    value: "{{inputs.parameters.account-namespace}}",
                  }
                - { name: timeout, value: "{{inputs.parameters.timeout}}" }
                - { name: log-level, value: "{{inputs.parameters.log-level}}" }
                - { name: teardown, value: "{{inputs.parameters.teardown}}" }
                - name: job-template
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    metadata:
                      generateName: resolve-account-id-{{inputs.parameters.account-number}}-
                    spec:
                      backoffLimit: 0
                      activeDeadlineSeconds: {{=int(duration(inputs.parameters['job-active-deadline']).Seconds())}}
                      ttlSecondsAfterFinished: {{=int(duration(inputs.parameters['job-ttl']).Seconds())}}
                      template:
                        spec:
                          serviceAccountName: {{inputs.parameters.account-runner-sa}}
                          imagePullSecrets:
                            - name: {{inputs.parameters.image-pull-secret}}
                          restartPolicy: Never
                          containers:
                            - name: query
                              image: {{inputs.parameters.query-pg-image}}
                              imagePullPolicy: Always
                              command: [sh, -c]
                              args:
                                - |
                                  set -eu
                                  /app/executor
                                  # first data row (skip the header); empty => no match
                                  account_id=$(tail -n +2 /tmp/out.csv | sed '/^$/d' | head -n 1)
                                  if [ -z "$account_id" ]; then
                                    echo "resolve-account: no account_numbers row for account-number={{inputs.parameters.account-number}}"
                                    exit 1
                                  fi
                                  echo "account_id=$account_id"
                                  echo "ARGO_RESULT_OUTPUT=$account_id"
                              env:
                                - name: QUERY
                                  value: >-
                                    SELECT account_id::string FROM account_numbers
                                    WHERE number = '{{inputs.parameters.account-number}}'
                                - { name: FORMAT, value: csv }
                                - { name: OUTPUT, value: /tmp/out.csv }
                                - { name: DB_TYPE, value: cockroachdb }
                                - { name: LOG_LEVEL, value: {{inputs.parameters.log-level}} }
                                - name: CONNECTION_STRING
                                  value: "{{inputs.parameters.account-connection-string}}"
                                - name: CA_AUTH_KEY
                                  valueFrom:
                                    secretKeyRef:
                                      name: {{inputs.parameters.account-ca-secret}}
                                      key: {{inputs.parameters.account-ca-auth-key}}
                                - { name: CA_ADDRESS, value: "{{inputs.parameters.account-ca-address}}" }
                                - { name: CA_PROFILE, value: "{{inputs.parameters.account-ca-profile}}" }
