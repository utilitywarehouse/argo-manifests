apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: test-artifact-upload
  namespace: qe-argo-workflows
spec:
  entrypoint: main
  arguments:
    parameters:
      - name: message
        value: "hello from argo workflow UI"
  templates:
    - name: main
      inputs:
        parameters:
          - name: message
      steps:
        - - name: generate
            template: generate-artifact
            arguments:
              parameters:
                - name: message
                  value: "{{inputs.parameters.message}}"
        - - name: consume
            template: consume-artifact
            arguments:
              artifacts:
                - name: message
                  from: "{{steps.generate.outputs.artifacts.message}}"

    - name: generate-artifact
      inputs:
        parameters:
          - name: message
      container:
        image: alpine:latest
        command: [sh, -c]
        args: ["echo '{{inputs.parameters.message}}' > /tmp/message.txt"]
      outputs:
        artifacts:
          - name: message
            path: /tmp/message.txt
            archive:
              none: {}

    - name: consume-artifact
      inputs:
        artifacts:
          - name: message
            path: /tmp/message.txt
      container:
        image: alpine:latest
        command: [sh, -c]
        args: ["cat /tmp/message.txt"]
