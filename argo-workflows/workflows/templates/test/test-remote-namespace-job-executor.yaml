apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: test-remote-namespace-job-executor
  namespace: qe-argo-workflows
spec:
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: print-grafana-sm-api-server
            templateRef:
              name: remote-namespace-job-executor
              template: execute-job
            arguments:
              parameters:
                - name: cluster-name
                  value: "exp-1-aws"
                - name: cluster-server
                  value: "https://elb.master.k8s.exp-1.aws.uw.systems"
                - name: target-namespace
                  value: "sys-k6"
                - name: job-template
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    metadata:
                      name: print-secret
                    spec:
                      template:
                        spec:
                          restartPolicy: Never
                          containers:
                            - name: print-secret
                              image: alpine:latest
                              command: [sh, -c]
                              args:
                                - echo "ARGO_RESULT_OUTPUT=$API_SERVER"
                              env:
                                - name: API_SERVER
                                  valueFrom:
                                    secretKeyRef:
                                      name: grafana-sm-agent
                                      key: api-server
