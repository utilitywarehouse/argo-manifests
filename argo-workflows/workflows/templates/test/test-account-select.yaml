# =============================================================================
# test-account-select — orchestrator for the account → energy → gentrack pipeline
# =============================================================================
# A thin orchestrator that pipes data through single-responsibility leaf
# WorkflowTemplates, one per platform, applying pre/post-processing at each hop.
# Given an account-number:
#
#   1. resolve-account-id           account# -> account_id       (ACCOUNT platform)
#        └─ account-platform leaf: point lookup on `number`; the leaf does light
#           in-Job processing (extract the id row from CSV, guard no-match).
#   2. resolve-service-identifiers  account_id -> supplies       (ENERGY platform)
#        └─ energy-platform leaf: plainest flat query, streamed as ndjson (no SQL
#           JSON assembly). ── the account_id piped from step 1 crosses here ──
#   3. build-model        JOIN: `select` assembles a NESTED account model —
#                         { account_number, account_id, supplies: [ {…per supply…} ] } —
#                         from the flat energy rows, as one ndjson artifact. This is
#                         the "model" the post-processing selects over.
#
#   Post-processing — the same `select` executor proving precise selection at every
#   granularity, AND that multiples survive (steps 4-8, each a DAG node named for what
#   it proves). Dual-fuel worked example: 2 supplies sharing gentrack J20000032681 but
#   with different mpxns (2474511605, 1410756580005):
#   4. select-full          FULL       the whole account object, both nested supplies (`rows[0]`) -> logs
#   5. select-supply-pairs  PARTIAL    supply_type+mpxn per supply — both fuels survive         -> logs
#   6. select-mpxns         SINGLE/×N  just the mpxns, flat list — both mpxns, no [0] index      -> logs
#   7. select-account-id    SINGLE/DIRECT  one top-level scalar (`rows[0].account_id`)           -> logs
#   8. select-gentrack      SINGLE/NESTED+DEDUP  gentrack# through the nested supplies, uniq'd
#                                      -> the shared J20000032681 collapses to one, as a PARAM.
#   9. summary            echo the assembled map (account-number / account-id /
#                         gentrack) to the logs.
#
# Purpose: demonstrate piping data between workflows AND that `select` can pull data out
# of a captured model at any precision — full / partial / single, nested or direct — while
# handling MULTIPLES without fixed indexes (never `.supplies[0]`), with no jq and no JSON
# assembled in SQL. Each stage is its own top-level DAG node, named for the stage; the
# inner leaf node names its platform. See docs/data-flow.md.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: test-account-select
  namespace: qe-argo-workflows
  annotations:
    workflows.argoproj.io/description: >-
      Orchestrates the account pipeline: account-number -> resolve-account (account_id)
      -> resolve-energy-service-identifiers (flat supplies) -> build a nested account
      model -> `select` pulls it at every precision (full / partial / single, nested or
      direct), capturing the distinct gentrack_account_numbers as a param. Submittable.
  labels:
    workflows.argoproj.io/creator: qe
    workflows.argoproj.io/invocation: standalone
    data.uw.systems/system: account
spec:
  entrypoint: main
  serviceAccountName: workflow-step-executor
  arguments:
    parameters:
      - { name: account-number }
      - {
          name: select-image,
          value: "registry.uw.systems/dev-enablement/select:chore-redesign-wkflw-data-prop",
        }
      # This pipeline spans two clusters/namespaces: the account lookup and the
      # energy service-identifier lookup. Hardcoded here for the test; for
      # cross-env use these are the knobs an invocation surface overrides per
      # environment (namespaces stay the same, clusters differ).
      - { name: account-cluster-name, value: dev-aws }
      - { name: account-namespace, value: account-platform }
      - { name: energy-service-cluster-name, value: dev-merit }
      - { name: energy-service-namespace, value: energy-platform }
      # Set false on a debug submit to keep the remote resolve Jobs for inspection.
      - { name: teardown, value: "true" }
  templates:
    - name: main
      inputs:
        parameters:
          - { name: account-number }
          - { name: select-image }
          - { name: account-cluster-name }
          - { name: account-namespace }
          - { name: energy-service-cluster-name }
          - { name: energy-service-namespace }
          - { name: teardown }
      steps:
        # 1) ACCOUNT platform: account-number -> account_id (param)
        - - name: resolve-account-id
            templateRef:
              name: resolve-account
              template: resolve
            arguments:
              parameters:
                - {
                    name: account-number,
                    value: "{{inputs.parameters.account-number}}",
                  }
                - {
                    name: account-cluster-name,
                    value: "{{inputs.parameters.account-cluster-name}}",
                  }
                - {
                    name: account-namespace,
                    value: "{{inputs.parameters.account-namespace}}",
                  }
                - { name: teardown, value: "{{inputs.parameters.teardown}}" }

        # 2) ENERGY platform: pipe account_id in -> the account's supplies as a flat
        #    ndjson artifact (`identifiers`). This is the workflow->workflow data pipe.
        - - name: resolve-service-identifiers
            templateRef:
              name: resolve-energy-service-identifiers
              template: resolve
            arguments:
              parameters:
                - {
                    name: account-id,
                    value: "{{steps.resolve-account-id.outputs.parameters.account-id}}",
                  }
                - {
                    name: energy-service-cluster-name,
                    value: "{{inputs.parameters.energy-service-cluster-name}}",
                  }
                - {
                    name: energy-service-namespace,
                    value: "{{inputs.parameters.energy-service-namespace}}",
                  }
                - { name: teardown, value: "{{inputs.parameters.teardown}}" }

        # 3) JOIN / build the account model: assemble a NESTED account object — the
        #    account scalars with its energy supplies nested under `supplies` — from the
        #    flat energy rows. One object, emitted as an ndjson artifact: the "model" the
        #    post-processing selects over (gives us both direct + nested fields to pull).
        - - name: build-model
            template: select
            arguments:
              artifacts:
                - {
                    name: input,
                    from: "{{steps.resolve-service-identifiers.outputs.artifacts.identifiers}}",
                  }
              parameters:
                - {
                    name: select-image,
                    value: "{{inputs.parameters.select-image}}",
                  }
                - name: expr
                  value: >-
                    [{
                      account_number: "{{inputs.parameters.account-number}}",
                      account_id: "{{steps.resolve-account-id.outputs.parameters.account-id}}",
                      supplies: map(rows, ({
                        supply_type: .supply_type,
                        mpxn: .mpxn,
                        gentrack_account_number: .gentrack_account_number,
                        gentrack_account_id: .gentrack_account_id,
                        gentrack_agreement_id: .gentrack_agreement_id,
                        gentrack_customer_id: .gentrack_customer_id
                      }))
                    }]
                - { name: output, value: /tmp/out } # emit the model as an artifact
                - { name: output-format, value: ndjson } # one account object per line

        # ---------------------------------------------------------------------------
        # Post-processing: prove precise selection over the model at every granularity,
        # and — critically — that MULTIPLES survive. Worked example: a dual-fuel account
        # has TWO supplies (gas + electricity) that share one gentrack account
        # (J20000032681) but have DIFFERENT mpxns (2474511605, 1410756580005) and
        # agreement ids. Same `select` executor each time; only the expr changes.
        #
        #   rows      = [ the one account object ]   (one account per run)
        #   rows[0]   = the account  — indexing the SINGLE account is fine
        #   .supplies = the nested list — we always map/filter OVER it, never .supplies[0],
        #               so both fuels are preserved. Zero supplies -> empty results, no break.
        # ---------------------------------------------------------------------------

        # 4) FULL — the whole account object, every property incl. BOTH nested supplies.
        - - name: select-full
            template: select
            arguments:
              artifacts:
                - {
                    name: input,
                    from: "{{steps.build-model.outputs.artifacts.result}}",
                  }
              parameters:
                - {
                    name: select-image,
                    value: "{{inputs.parameters.select-image}}",
                  }
                - { name: expr, value: "rows[0]" }
                - { name: output-format, value: json }

          # 5) PARTIAL over MULTIPLES — supply_type + mpxn PER supply. Maps over the whole
          #    nested list, so the gas AND electricity rows both come out (2 objects), proving
          #    we don't collapse or drop a fuel: [{gas,2474511605},{electricity,1410756580005}].
          - name: select-supply-pairs
            template: select
            arguments:
              artifacts:
                - {
                    name: input,
                    from: "{{steps.build-model.outputs.artifacts.result}}",
                  }
              parameters:
                - {
                    name: select-image,
                    value: "{{inputs.parameters.select-image}}",
                  }
                - name: expr
                  value: "map(rows[0].supplies, ({supply_type: .supply_type, mpxn: .mpxn}))"
                - { name: output-format, value: json }

          # 6) SINGLE property across MULTIPLES — just the mpxns, as a flat list. No fixed
          #    index anywhere -> BOTH mpxns land: ["2474511605","1410756580005"]. This is the
          #    shape a downstream fan-out / SQL IN(...) would consume.
          - name: select-mpxns
            template: select
            arguments:
              artifacts:
                - {
                    name: input,
                    from: "{{steps.build-model.outputs.artifacts.result}}",
                  }
              parameters:
                - {
                    name: select-image,
                    value: "{{inputs.parameters.select-image}}",
                  }
                - { name: expr, value: "map(rows[0].supplies, .mpxn)" }
                - { name: output-format, value: lines } # one mpxn per line, readable

          # 7) SINGLE / DIRECT — one top-level scalar off the account object (account_id).
          - name: select-account-id
            template: select
            arguments:
              artifacts:
                - {
                    name: input,
                    from: "{{steps.build-model.outputs.artifacts.result}}",
                  }
              parameters:
                - {
                    name: select-image,
                    value: "{{inputs.parameters.select-image}}",
                  }
                - { name: expr, value: "rows[0].account_id" }
                - { name: output-format, value: lines }

          # 8) SINGLE / NESTED + DEDUP — the gentrack_account_number reached through the nested
          #    supplies, uniq'd. The 2 supplies SHARE J20000032681, so uniq collapses them to a
          #    single element ["J20000032681"] — proving dedup, not row loss. Captured as the
          #    `result` PARAMETER: the clean fan-out key (one gentrack account, not two).
          - name: select-gentrack
            template: select
            arguments:
              artifacts:
                - {
                    name: input,
                    from: "{{steps.build-model.outputs.artifacts.result}}",
                  }
              parameters:
                - {
                    name: select-image,
                    value: "{{inputs.parameters.select-image}}",
                  }
                - name: expr
                  value: "uniq(map(filter(rows[0].supplies, .gentrack_account_number != nil), .gentrack_account_number))"
                - { name: output, value: /tmp/out } # capture as the `result` parameter
                - { name: output-format, value: json }

        # 9) echo the isolated account map to the logs
        #    NB: pass the upstream step outputs in as arguments — an `inline` template
        #    does NOT inherit the parent steps scope, so {{steps.*}} refs won't resolve
        #    inside it. Use a normal template that takes them as inputs.
        - - name: summary
            template: summary
            arguments:
              parameters:
                - {
                    name: account-number,
                    value: "{{inputs.parameters.account-number}}",
                  }
                - {
                    name: account-id,
                    value: "{{steps.resolve-account-id.outputs.parameters.account-id}}",
                  }
                - {
                    name: gentrack,
                    value: "{{steps.select-gentrack.outputs.parameters.result}}",
                  }

    - name: summary
      inputs:
        parameters:
          - { name: account-number }
          - { name: account-id }
          - { name: gentrack }
      container:
        image: alpine:3.21
        command: [sh, -c]
        args:
          - |
            echo "=== account map (post-processed via select) ==="
            echo "account_number = {{inputs.parameters.account-number}}"
            echo "account_id     = {{inputs.parameters.account-id}}"
            echo "gentrack_account_numbers = {{inputs.parameters.gentrack}}"

    # Reusable select step: mounts an ndjson artifact at /tmp/in.ndjson, runs an expr over
    # `rows`, and emits. The result is ALWAYS written to stdout (the pod logs). `output` is
    # additive: set it to /tmp/out to ALSO write the emission to a file, captured as BOTH the
    # `result` artifact (for a downstream select to mount — e.g. the built model) and the
    # `result` parameter. With the default output=- there is no file, so both are absent (the
    # artifact is optional, the param defaults to "").
    - name: select
      inputs:
        artifacts:
          - { name: input, path: /tmp/in.ndjson }
        parameters:
          - { name: select-image }
          - { name: expr }
          - { name: output, value: "-" }
          - { name: format, value: ndjson }
          - { name: output-format, value: json }
      container:
        image: "{{inputs.parameters.select-image}}"
        imagePullPolicy: Always
        env:
          - { name: INPUT, value: /tmp/in.ndjson }
          - { name: FORMAT, value: "{{inputs.parameters.format}}" }
          - { name: SELECT, value: "{{inputs.parameters.expr}}" }
          - { name: OUTPUT, value: "{{inputs.parameters.output}}" }
          - {
              name: OUTPUT_FORMAT,
              value: "{{inputs.parameters.output-format}}",
            }
          - { name: LOG_LEVEL, value: debug }
      outputs:
        artifacts:
          # The emitted file — only when output is set (e.g. /tmp/out) — e.g. the built model,
          # mounted by a downstream select. optional: with the default output=- there is no file.
          - name: result
            path: /tmp/out
            optional: true
            archive:
              none: {}
        parameters:
          - name: result
            valueFrom:
              path: /tmp/out
              default: ""
