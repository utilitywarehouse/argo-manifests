# dev-merit overlay for base/data-import-energy-tariff-system.yaml
# Appends this deployment target's dispatch (cluster/namespace) + data plane
# (staging-ept RDS + S3 bucket). A prod overlay would carry prod's equivalents.
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value: { name: target-namespace, value: staging-ept }
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value: { name: cluster-name, value: dev-merit }
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value:
    {
      name: orchestrator-db-dsn,
      value: "postgres://dev_data_orchestrator_role@qe-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com:5432/dev_data_orchestrator_db?sslmode=require",
    }
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value: { name: orchestrator-db-secret, value: "" }
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value: { name: orchestrator-db-dsn-key, value: "" }
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value: { name: aws-bucket, value: uw-dev-qe-dev-data-orchestrator }
# Destination DB (tariff_system_db) the import writes into — IAM auth, passwordless.
- op: add
  path: /spec/workflowSpec/arguments/parameters/-
  value:
    name: adapter-dsn
    value: "postgres://data_orchestrator_role@staging-ept-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com:5432/tariff_system_db?sslmode=require"
- op: add
  path: /metadata/labels/data.uw.systems~1cluster
  value: dev-merit
- op: add
  path: /metadata/labels/data.uw.systems~1namespace
  value: staging-ept
- op: add
  path: /spec/workflowSpec/workflowMetadata/labels/data.uw.systems~1cluster
  value: dev-merit
- op: add
  path: /spec/workflowSpec/workflowMetadata/labels/data.uw.systems~1namespace
  value: staging-ept
