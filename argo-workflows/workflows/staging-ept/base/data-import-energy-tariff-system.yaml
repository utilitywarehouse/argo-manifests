apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: data-import-energy-tariff-system
  namespace: qe-argo-workflows
  annotations:
    workflows.argoproj.io/description: >-
      energy_tariff_system data import to staging-ept
  labels:
    workflows.argoproj.io/creator: energy
    data.uw.systems/system: energy-tariff-system
    data.uw.systems/capability: data-import
spec:
  schedules:
    - "0 2 * * *"
  timezone: Europe/London
  suspend: true # manual-only until a schedule is intentionally enabled
  concurrencyPolicy: Forbid
  workflowSpec:
    serviceAccountName: workflow-step-executor
    # Stamp each spawned Workflow run with the same intrinsic labels, so runs (not just the cron)
    # are filterable. cluster/namespace are appended here per-deployment by the overlays.
    workflowMetadata:
      labels:
        data.uw.systems/system: energy-tariff-system
        data.uw.systems/capability: data-import
    workflowTemplateRef:
      name: data-orchestrator-runner
    arguments:
      parameters:
        - { name: mode, value: import }
        - { name: run-type, value: RUN_TYPE_IMPORT }
        - { name: system-key, value: energy_tariff_system }
        # tables available to readonly user - https://github.com/utilitywarehouse/terraform/blob/master/aws/dev/energy-rds/databases.tf#L144
        - {
            name: entities,
            value: "tariffs, tariff_versions, tariff_rates, tariff_standing_charges,eligibility_criteria, tariff_eligibility",
          }
        - { name: label, value: energy-tariff-system-import }
        # target-namespace + cluster-name are deployment/cluster-specific — appended by the
        # per-deployment overlay (workflows/staging-ept/overlays/<cluster>), not set here.
        - {
            name: orchestrator-db-dsn,
            value: "postgres://data_orchestrator_role@staging-ept-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com:5432/staging_data_orchestrator_db?sslmode=require",
          }
        # Destination DB (tariff_system_db) — IAM-auth literal DSN, no secret. The runner-sa's
        # vault role mints the RDS token for tariff_system_api_role.
        - {
            name: adapter-dsn,
            value: "postgres://tariff_system_api_role@staging-ept-rds.c4jv4shioc7c.eu-west-1.rds.amazonaws.com:5432/tariff_system_db?sslmode=require",
          }
        # Job pod identity for the import — carries the vault role granting rds-db:connect on
        # tariff_system_db (must already exist in the staging-ept namespace).
        - { name: runner-sa, value: energy-tariff-system-api-user }
