apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: get-result
  namespace: sys-argo-workflows
spec:
  templates:
    - name: json
      inputs:
        parameters:
          - name: value
          - name: filter
            # Any valid jq filter expression. Examples:
            #   single field:      ".status.phase"
            #   multiple fields:   "{node: .spec.nodeName, ns: .metadata.namespace}"
            #   array items:       "[.items[] | {name: .metadata.name}]"
            #   nested:            ".spec.containers[0].image"
            # Full jq manual: https://jqlang.org/manual/
            # Test filters:   https://jqplay.org
      outputs:
        parameters:
          - name: result
            valueFrom:
              path: /tmp/out.json
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            apk add --no-cache jq > /dev/null 2>&1
            echo '{{inputs.parameters.value}}' | base64 -d | jq '{{inputs.parameters.filter}}' | tee /tmp/out.json

    - name: json-multi
      inputs:
        parameters:
          - name: values
            # Array of {label, value} pairs where value is base64-encoded JSON:
            # [
            #   {"label": "minikube-b", "value": "<base64-encoded-json>"},
            #   {"label": "minikube-c", "value": "<base64-encoded-json>"}
            # ]
          - name: filter
            # jq filter applied to each value individually.
            # Full jq manual: https://jqlang.org/manual/
            # Test filters:   https://jqplay.org
      outputs:
        parameters:
          - name: result
            valueFrom:
              path: /tmp/out.json
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            apk add --no-cache jq > /dev/null 2>&1

            VALUES='{{inputs.parameters.values}}'
            FILTER='{{inputs.parameters.filter}}'

            echo "$VALUES" | jq -c '.[]' | while read -r item; do
              LABEL=$(echo "$item" | jq -r '.label')
              echo "$item" | jq -r '.value' | base64 -d | jq --arg label "$LABEL" \
                "{label: \$label, result: ($FILTER)}"
            done | jq -s '.' | tee /tmp/out.json
