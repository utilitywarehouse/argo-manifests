apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: test-secret-access-
  namespace: sys-argo-workflows
spec:
  serviceAccountName: workflow-runner
  entrypoint: main

  templates:
    - name: main
      steps:
        # Test 1: Access secret with default SA
        - - name: get-secret-default-sa
            templateRef:
              name: remote-cluster-job-executor
              template: execute-job
            arguments:
              parameters:
                - name: cluster-name
                  value: minikube-b
                - name: cluster-server
                  value: https://host.docker.internal:56256
                - name: ca-cert-url
                  value: http://192.168.68.59:8888/minikube-b/ca.crt
                - name: target-namespace
                  value: b-namespace
                - name: job-template
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    spec:
                      template:
                        spec:
                          restartPolicy: Never
                          # Using default SA (no serviceAccountName specified)
                          containers:
                            - name: task
                              image: bitnami/kubectl:latest
                              command: ["sh", "-c"]
                              args:
                                - |
                                  echo "========================================="
                                  echo "SECRET ACCESS TEST - DEFAULT SA"
                                  echo "========================================="
                                  
                                  NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                                  POD=$(hostname)
                                  CLUSTER=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "unknown")
                                  
                                  # Check who we are
                                  echo "Running as:"
                                  kubectl auth whoami 2>/dev/null || echo "Cannot determine identity"
                                  echo ""
                                  
                                  # Try to list secrets
                                  echo "Attempting to list secrets in namespace: $NAMESPACE"
                                  if kubectl get secrets -n $NAMESPACE > /dev/null 2>&1; then
                                    SECRET_COUNT=$(kubectl get secrets -n $NAMESPACE --no-headers | wc -l)
                                    echo "✓ Can list secrets: $SECRET_COUNT found"
                                    CAN_LIST="true"
                                  else
                                    echo "✗ Cannot list secrets (forbidden)"
                                    CAN_LIST="false"
                                  fi
                                  echo ""
                                  
                                  # Try to read a specific secret (create test secret first)
                                  echo "Attempting to read secret 'test-secret'"
                                  if kubectl get secret test-secret -n $NAMESPACE -o jsonpath='{.data.key}' > /dev/null 2>&1; then
                                    echo "✓ Can read secret 'test-secret'"
                                    CAN_READ="true"
                                  else
                                    echo "✗ Cannot read secret (not found or forbidden)"
                                    CAN_READ="false"
                                  fi
                                  echo ""
                                  
                                  # Build result
                                  RESULT=$(jq -n \
                                    --arg cluster "$CLUSTER" \
                                    --arg namespace "$NAMESPACE" \
                                    --arg pod "$POD" \
                                    --arg sa "default" \
                                    --arg can_list "$CAN_LIST" \
                                    --arg can_read "$CAN_READ" \
                                    '{
                                      cluster: $cluster,
                                      namespace: $namespace,
                                      pod: $pod,
                                      serviceAccount: $sa,
                                      permissions: {
                                        list_secrets: $can_list,
                                        read_secrets: $can_read
                                      }
                                    }')
                                  
                                  echo "ARGO_RESULT_OUTPUT=$(echo "$RESULT" | base64 -w0)"

        # Test 2: Access secret with custom SA
        - - name: get-secret-custom-sa
            templateRef:
              name: remote-cluster-job-executor
              template: execute-job
            arguments:
              parameters:
                - name: cluster-name
                  value: minikube-b
                - name: cluster-server
                  value: https://host.docker.internal:56256
                - name: ca-cert-url
                  value: http://192.168.68.59:8888/minikube-b/ca.crt
                - name: target-namespace
                  value: b-namespace
                - name: job-template
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    spec:
                      template:
                        spec:
                          restartPolicy: Never
                          serviceAccountName: secret-reader
                          containers:
                            - name: task
                              image: bitnami/kubectl:latest
                              command: ["sh", "-c"]
                              args:
                                - |
                                  echo "========================================="
                                  echo "SECRET ACCESS TEST - CUSTOM SA"
                                  echo "========================================="
                                  
                                  NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                                  POD=$(hostname)
                                  CLUSTER=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "unknown")
                                  
                                  # Check who we are
                                  echo "Running as:"
                                  kubectl auth whoami 2>/dev/null || echo "Cannot determine identity"
                                  echo ""
                                  
                                  # Try to list secrets
                                  echo "Attempting to list secrets in namespace: $NAMESPACE"
                                  if kubectl get secrets -n $NAMESPACE > /dev/null 2>&1; then
                                    SECRET_COUNT=$(kubectl get secrets -n $NAMESPACE --no-headers | wc -l)
                                    echo "✓ Can list secrets: $SECRET_COUNT found"
                                    CAN_LIST="true"
                                  else
                                    echo "✗ Cannot list secrets (forbidden)"
                                    CAN_LIST="false"
                                  fi
                                  echo ""
                                  
                                  # Try to read a specific secret
                                  echo "Attempting to read secret 'test-secret'"
                                  if kubectl get secret test-secret -n $NAMESPACE -o jsonpath='{.data.key}' > /dev/null 2>&1; then
                                    SECRET_VALUE=$(kubectl get secret test-secret -n $NAMESPACE -o jsonpath='{.data.key}' | base64 -d)
                                    echo "✓ Can read secret 'test-secret': $SECRET_VALUE"
                                    CAN_READ="true"
                                  else
                                    echo "✗ Cannot read secret (not found or forbidden)"
                                    CAN_READ="false"
                                  fi
                                  echo ""
                                  
                                  # Build result
                                  RESULT=$(jq -n \
                                    --arg cluster "$CLUSTER" \
                                    --arg namespace "$NAMESPACE" \
                                    --arg pod "$POD" \
                                    --arg sa "secret-reader" \
                                    --arg can_list "$CAN_LIST" \
                                    --arg can_read "$CAN_READ" \
                                    '{
                                      cluster: $cluster,
                                      namespace: $namespace,
                                      pod: $pod,
                                      serviceAccount: $sa,
                                      permissions: {
                                        list_secrets: $can_list,
                                        read_secrets: $can_read
                                      }
                                    }')
                                  
                                  echo "ARGO_RESULT_OUTPUT=$(echo "$RESULT" | base64 -w0)"

        - - name: show-default-sa-result
            templateRef:
              name: get-result
              template: json
            arguments:
              parameters:
                - name: value
                  value: "{{steps.get-secret-default-sa.outputs.parameters.result}}"
                - name: filter
                  value: "."

        - - name: show-custom-sa-result
            templateRef:
              name: get-result
              template: json
            arguments:
              parameters:
                - name: value
                  value: "{{steps.get-secret-custom-sa.outputs.parameters.result}}"
                - name: filter
                  value: "."

  ttlStrategy:
    secondsAfterCompletion: 86400
