apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: secret-access-test-
  namespace: sys-argo-workflows
spec:
  serviceAccountName: workflow-runner
  entrypoint: main

  templates:
    - name: main
      steps:
        # Try to access secret from sys-argo-workflows (should fail)
        - - name: access-from-sys-namespace
            template: access-secret-direct
            arguments:
              parameters:
                - name: namespace
                  value: sys-argo-workflows
            continueOn:
              failed: true

        # Try to access secret from test-namespace (should fail)
        - - name: access-from-test-namespace
            template: access-secret-direct
            arguments:
              parameters:
                - name: namespace
                  value: test-namespace
            continueOn:
              failed: true

        # Spawn job IN test-namespace to access secret (should succeed)
        - - name: spawn-job-in-test-namespace
            template: spawn-job-access-secret
            arguments:
              parameters:
                - name: target-namespace
                  value: test-namespace

        # Display the secret value back in sys-argo-workflows
        - - name: display-result
            template: show-secret-value
            arguments:
              parameters:
                - name: secret-value
                  value: "{{steps.spawn-job-in-test-namespace.outputs.parameters.secret-value}}"

    # Template: Try to access secret directly (will fail due to RBAC)
    - name: access-secret-direct
      inputs:
        parameters:
          - name: namespace
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          NS={{inputs.parameters.namespace}}

          echo "========================================="
          echo "ATTEMPT: Direct secret access from workflow pod"
          echo "========================================="
          echo "Target namespace: $NS"
          echo "Current pod namespace: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
          echo ""

          echo "Trying to read secret 'db-secret' in namespace $NS..."
          kubectl get secret db-secret -n $NS -o yaml

          if [ $? -eq 0 ]; then
            echo ""
            echo "SUCCESS: Decoded password:"
            kubectl get secret db-secret -n $NS -o jsonpath='{.data.password}' | base64 -d
            echo ""
          else
            echo "FAILED: Cannot access secret (expected if different namespace)"
            exit 1
          fi

    # Template: Spawn job in target namespace with secret mounted
    - name: spawn-job-access-secret
      inputs:
        parameters:
          - name: target-namespace
      outputs:
        parameters:
          - name: secret-value
            valueFrom:
              path: /tmp/secret-value.txt
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          TARGET_NS={{inputs.parameters.target-namespace}}
          JOB_NAME="{{pod.name}}"

          echo "========================================="
          echo "SPAWNING JOB IN TARGET NAMESPACE"
          echo "========================================="
          echo "Target namespace: $TARGET_NS"
          echo "Job name: $JOB_NAME"
          echo ""

          # Create job with secret mounted as environment variable
          kubectl create -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $JOB_NAME
            namespace: $TARGET_NS
          spec:
            template:
              spec:
                restartPolicy: Never
                containers:
                - name: task
                  image: alpine:latest
                  command: [sh, -c]
                  args:
                  - |
                    echo "========================================="
                    echo "JOB RUNNING IN TARGET NAMESPACE"
                    echo "========================================="
                    echo "Running in namespace: \$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo '$TARGET_NS')"
                    echo "Pod: \$(hostname)"
                    echo ""
                    
                    echo "Accessing secret via mounted environment variable..."
                    echo "DB_PASSWORD value: \$DB_PASSWORD"
                    echo ""
                    
                    echo "SUCCESS: Secret accessed from $TARGET_NS namespace!"
                    echo ""
                    
                    # Output the secret value for capture
                    echo "\$DB_PASSWORD"
                  env:
                  # Mount secret from the namespace where job is running
                  - name: DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: db-secret
                        key: password
          EOF

          echo "Job created. Waiting for completion..."
          kubectl wait --for=condition=complete job/$JOB_NAME -n $TARGET_NS --timeout=60s

          echo ""
          echo "Job logs:"
          echo "========================================="
          kubectl logs job/$JOB_NAME -n $TARGET_NS
          echo "========================================="
          echo ""

          # Extract the secret value (last line of output)
          kubectl logs job/$JOB_NAME -n $TARGET_NS | tail -n 1 > /tmp/secret-value.txt

          echo "Extracted secret value: $(cat /tmp/secret-value.txt)"

          # Cleanup
          kubectl delete job/$JOB_NAME -n $TARGET_NS

    # Template: Display the secret value in sys-argo-workflows
    - name: show-secret-value
      inputs:
        parameters:
          - name: secret-value
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            echo "========================================="
            echo "BACK IN SYS-ARGO-WORKFLOWS NAMESPACE"
            echo "========================================="
            echo "Current namespace: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
            echo ""
            echo "Secret value received from test-namespace:"
            echo "{{inputs.parameters.secret-value}}"
            echo ""
            echo "Successfully retrieved and used secret from remote namespace!"

  ttlStrategy:
    secondsAfterCompletion: 300

  podGC:
    strategy: OnWorkflowCompletion
