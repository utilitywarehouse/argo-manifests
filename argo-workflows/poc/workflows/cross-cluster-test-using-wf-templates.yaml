apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: cross-cluster-dynamic-using-workflow-template-
  namespace: sys-argo-workflows
spec:
  serviceAccountName: workflow-runner
  entrypoint: main

  templates:
    - name: main
      steps:
        - - name: do-in-cluster-b
            templateRef:
              name: remote-cluster-job-executor
              template: execute-job
            arguments:
              parameters:
                - name: cluster-name
                  value: minikube-b
                - name: cluster-server
                  value: https://host.docker.internal:56256
                - name: ca-cert-url
                  value: http://192.168.68.59:8888/minikube-b/ca.crt
                - name: target-namespace
                  value: b-namespace
                - name: job-template
                  # use your own sa in the job. spec.template.specserviceAccountName
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    spec:
                      template:
                        spec:
                          restartPolicy: Never
                          containers:
                            - name: task
                              image: bitnami/kubectl:latest
                              command: ["sh", "-c"]
                              args:
                                - |
                                  NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                                  POD=$(hostname)
                                  
                                  # Try to get cluster info (might fail if no RBAC)
                                  CLUSTER=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "unknown")
                                  NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}' 2>/dev/null || echo "unknown")
                                  
                                  # Always output valid JSON
                                  RESULT=$(printf '{"cluster":"%s","node_ip":"%s","namespace":"%s","pod":"%s"}' "$CLUSTER" "$NODE_IP" "$NAMESPACE" "$POD")
                                  
                                  # Set ARGO_RESULT_OUTPUT (standard marker)
                                  echo "ARGO_RESULT_OUTPUT=$(echo "$RESULT" | base64 -w0)"

        - - name: do-in-cluster-c
            templateRef:
              name: remote-cluster-job-executor
              template: execute-job
            arguments:
              parameters:
                - name: cluster-name
                  value: minikube-c
                - name: cluster-server
                  value: https://host.docker.internal:56327
                - name: ca-cert-url
                  value: http://192.168.68.59:8888/minikube-c/ca.crt
                - name: target-namespace
                  value: c-namespace
                - name: teardown
                  value: false
                - name: job-template
                  value: |
                    apiVersion: batch/v1
                    kind: Job
                    spec:
                      template:
                        spec:
                          restartPolicy: Never
                          containers:
                            - name: task
                              image: bitnami/kubectl:latest
                              command: ["sh", "-c"]
                              args:
                                - |
                                  NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                                  POD=$(hostname)
                                  
                                  # Try to get cluster info (might fail if no RBAC)
                                  CLUSTER=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "unknown")
                                  NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}' 2>/dev/null || echo "unknown")
                                  
                                  # Always output valid JSON
                                  RESULT=$(printf '{"cluster":"%s","node_ip":"%s","namespace":"%s","pod":"%s"}' "$CLUSTER" "$NODE_IP" "$NAMESPACE" "$POD")
                                  
                                  # Set ARGO_RESULT_OUTPUT (our marker)
                                  echo "ARGO_RESULT_OUTPUT=$(echo "$RESULT" | base64 -w0)"

        # Step 3: Collect and parse both results
        - - name: combine-results
            templateRef:
              name: get-result
              template: json-multi
            arguments:
              parameters:
                - name: filter
                  value: "{cluster: .cluster, node_ip: .node_ip, namespace: .namespace, pod: .pod}"
                - name: values
                  value: |
                    [
                      {"label": "minikube-b", "value": "{{steps.do-in-cluster-b.outputs.parameters.result}}"},
                      {"label": "minikube-c", "value": "{{steps.do-in-cluster-c.outputs.parameters.result}}"}
                    ]

  ttlStrategy:
    secondsAfterCompletion: 86400
