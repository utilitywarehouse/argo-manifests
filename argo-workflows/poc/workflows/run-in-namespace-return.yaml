apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: cross-namespace-data-
  namespace: sys-argo-workflows
spec:
  serviceAccountName: workflow-runner
  entrypoint: main

  templates:
    - name: main
      steps:
        # Step 1: Run job in test-namespace and get result
        - - name: query-remote-namespace
            template: run-remote-job
            arguments:
              parameters:
                - name: target-namespace
                  value: test-namespace

        # Step 2: Use the result in sys-argo-workflows
        - - name: process-result
            template: use-result
            arguments:
              parameters:
                - name: customer-id
                  value: "{{steps.query-remote-namespace.outputs.parameters.customer-id}}"
                - name: customer-email
                  value: "{{steps.query-remote-namespace.outputs.parameters.customer-email}}"

    # Template: Run job in remote namespace and capture outputs
    - name: run-remote-job
      inputs:
        parameters:
          - name: target-namespace
      outputs:
        parameters:
          - name: customer-id
            valueFrom:
              path: /tmp/customer-id.txt
          - name: customer-email
            valueFrom:
              path: /tmp/customer-email.txt
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          TARGET_NS={{inputs.parameters.target-namespace}}
          JOB_NAME="{{pod.name}}"

          echo "========================================="
          echo "RUNNING JOB IN REMOTE NAMESPACE"
          echo "========================================="
          echo "Target namespace: $TARGET_NS"
          echo "Job name: $JOB_NAME"
          echo "Workflow: {{workflow.name}}"
          echo ""

          # Create job
          kubectl create -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $JOB_NAME
            namespace: $TARGET_NS
            labels:
              argo-workflow-uid: "{{workflow.uid}}"
              argo-workflow-name: "{{workflow.name}}"
          spec:
            template:
              spec:
                restartPolicy: Never
                containers:
                - name: task
                  image: alpine:latest
                  command: [sh, -c]
                  args:
                  - |
                    echo "Running in namespace: \$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo '$TARGET_NS')"
                    echo "Pod: \$(hostname)"
                    echo ""
                    
                    # Simulate data retrieval
                    # In real use: psql -t -A -c "SELECT id, email FROM customers LIMIT 1"
                    CUSTOMER_ID="CUST-12345"
                    CUSTOMER_EMAIL="user@example.com"
                    
                    echo "Retrieved data:"
                    echo "  Customer ID: \$CUSTOMER_ID"
                    echo "  Email: \$CUSTOMER_EMAIL"
                    echo ""
                    
                    # Output values (one per line for easy parsing)
                    echo "\$CUSTOMER_ID"
                    echo "\$CUSTOMER_EMAIL"
          EOF

          echo "Job created. Waiting for completion..."

          # Wait for job to complete
          kubectl wait --for=condition=complete job/$JOB_NAME -n $TARGET_NS --timeout=60s

          echo "Job completed. Fetching logs..."
          echo ""

          # Get logs
          kubectl logs job/$JOB_NAME -n $TARGET_NS > /tmp/output.txt

          # Display full output for debugging
          echo "Full job output:"
          cat /tmp/output.txt
          echo ""

          # Extract last 2 lines (the actual data values)
          tail -n 2 /tmp/output.txt | head -n 1 > /tmp/customer-id.txt
          tail -n 1 /tmp/output.txt > /tmp/customer-email.txt

          echo "Extracted values:"
          echo "  Customer ID: $(cat /tmp/customer-id.txt)"
          echo "  Email: $(cat /tmp/customer-email.txt)"
          echo ""

          # Cleanup job
          # echo "Cleaning up job..."
          # kubectl delete job/$JOB_NAME -n $TARGET_NS

          echo "Done!"

    # Template: Use the result in sys-argo-workflows
    - name: use-result
      inputs:
        parameters:
          - name: customer-id
          - name: customer-email
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            echo "========================================="
            echo "PROCESSING RESULT IN SYS-ARGO-WORKFLOWS"
            echo "========================================="
            echo ""
            echo "Current namespace: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
            echo "Pod: $(hostname)"
            echo ""
            echo "Received data from test-namespace:"
            echo "  Customer ID: {{inputs.parameters.customer-id}}"
            echo "  Email: {{inputs.parameters.customer-email}}"
            echo ""

            # You can now use these values for further processing
            CUSTOMER_ID="{{inputs.parameters.customer-id}}"
            EMAIL="{{inputs.parameters.customer-email}}"

            echo "Processing customer: $CUSTOMER_ID"
            echo "Sending notification to: $EMAIL"
            echo ""
            echo "Successfully processed data from remote namespace!"

  ttlStrategy:
    secondsAfterCompletion: 300

  podGC:
    strategy: OnWorkflowCompletion
