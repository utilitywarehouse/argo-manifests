apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: cross-namespace-
  namespace: sys-argo-workflows
spec:
  serviceAccountName: workflow-runner
  entrypoint: main

  templates:
    - name: main
      steps:
        # Step 1: Show who workflow is running as and where
        - - name: show-workflow-identity
            template: show-identity

        # Step 2: Create and run job in test-namespace
        - - name: run-in-test-namespace
            template: create-remote-job
            arguments:
              parameters:
                - name: target-namespace
                  value: test-namespace

        # Step 3: Verify job ran in different namespace
        - - name: verify-location
            template: verify-job-location

    - name: show-identity
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          echo "========================================="
          echo "WORKFLOW POD IDENTITY & LOCATION"
          echo "========================================="
          echo ""

          echo "Who am I:"
          kubectl auth whoami
          echo ""

          echo "Running in namespace:"
          cat /var/run/secrets/kubernetes.io/serviceaccount/namespace
          echo ""

          echo "ServiceAccount:"
          cat /var/run/secrets/kubernetes.io/serviceaccount/namespace
          echo ""

          echo "Pod name:"
          hostname
          echo ""

          echo "Can I create jobs in test-namespace?"
          kubectl auth can-i create jobs -n test-namespace
          echo ""

          echo "Can I get pod logs in test-namespace?"
          kubectl auth can-i get pods/log -n test-namespace

    - name: create-remote-job
      inputs:
        parameters:
          - name: target-namespace
      outputs:
        parameters:
          - name: job-name
            valueFrom:
              path: /tmp/job-name.txt
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          TARGET_NS={{inputs.parameters.target-namespace}}
          JOB_NAME="remote-job-$(date +%s)"

          echo "========================================="
          echo "CREATING JOB IN REMOTE NAMESPACE"
          echo "========================================="
          echo "Target namespace: $TARGET_NS"
          echo "Job name: $JOB_NAME"
          echo ""

          # Create job in target namespace
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $JOB_NAME
            namespace: $TARGET_NS
          spec:
            template:
              spec:
                restartPolicy: Never
                containers:
                - name: task
                  image: alpine:latest
                  command: [sh, -c]
                  args:
                  - |
                    echo "========================================="
                    echo "JOB EXECUTION LOCATION"
                    echo "========================================="
                    echo "Job is running in namespace:"
                    cat /var/run/secrets/kubernetes.io/serviceaccount/namespace
                    echo ""
                    echo "My pod name is: \$(hostname)"
                    echo ""
                    echo "This proves I'm running in namespace: $TARGET_NS"
                    echo "The workflow pod runs in: sys-argo-workflows"
                    echo ""
                    echo "✓ Cross-namespace job execution successful!"
          EOF

          echo "$JOB_NAME" > /tmp/job-name.txt

          echo ""
          echo "Created job: $JOB_NAME in namespace: $TARGET_NS"
          echo ""

          # Wait for job to complete
          echo "Waiting for job to complete..."
          kubectl wait --for=condition=complete job/$JOB_NAME -n $TARGET_NS --timeout=60s

          echo ""
          echo "Job completed! Fetching logs..."
          echo ""

          # Get logs
          kubectl logs job/$JOB_NAME -n $TARGET_NS

    - name: verify-job-location
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          echo "========================================="
          echo "VERIFICATION"
          echo "========================================="
          echo ""

          echo "My identity:"
          kubectl auth whoami
          echo ""

          echo "Workflow pods in sys-argo-workflows:"
          kubectl get pods -n sys-argo-workflows --show-labels | grep cross-namespace || echo "No workflow pods found"
          echo ""

          echo "Jobs in test-namespace:"
          kubectl get jobs -n test-namespace
          echo ""

          echo "Pods in test-namespace:"
          kubectl get pods -n test-namespace
          echo ""

          echo "Summary:"
          echo "- Workflow pods run in: sys-argo-workflows"
          echo "- Jobs created in: test-namespace"
          echo "- ServiceAccount used: workflow-runner (in sys-argo-workflows)"
          echo "- This works because of ClusterRole + ClusterRoleBinding"

  ttlStrategy:
    secondsAfterCompletion: 300

  podGC:
    strategy: OnWorkflowCompletion
