apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: test-connectivity-
  namespace: sys-argo-workflows
spec:
  serviceAccountName: workflow-runner
  entrypoint: main

  templates:
    - name: main
      steps:
        - - name: test-all-hosts
            template: test-connection
            arguments:
              parameters:
                - name: test-url
                  value: "{{item}}"
            withItems:
              - "https://host.docker.internal:56256/version"
              - "https://host.docker.internal:56327/version"

    - name: test-connection
      inputs:
        parameters:
          - name: test-url
      script:
        image: curlimages/curl:latest
        command: [sh]
        source: |
          URL="{{inputs.parameters.test-url}}"

          echo "========================================="
          echo "Testing: $URL"
          echo "========================================="
          echo ""

          # Try to connect with timeout
          if curl -k --max-time 5 "$URL" 2>&1; then
            echo ""
            echo "✓ SUCCESS - Reachable"
          else
            echo ""
            echo "✗ FAILED - Not reachable"
          fi

  ttlStrategy:
    secondsAfterCompletion: 3600
