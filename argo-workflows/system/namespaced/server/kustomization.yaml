apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - upstream/deployment.yaml
  - upstream/role.yaml
  - upstream/rolebinding.yaml
  - upstream/service.yaml
  - upstream/serviceaccount.yaml

patches:
  - path: patches/role.yaml
    target:
      kind: Role
      name: argo-server-role
  - path: patches/deployment.yaml
    target:
      kind: Deployment
      name: argo-server
  - path: patches/argo-server-sa.yaml
    target:
      kind: ServiceAccount
      name: argo-server
